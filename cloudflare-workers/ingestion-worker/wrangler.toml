name = "helmetsan-ingestion-worker"
main = "src/index.js"
compatibility_date = "2024-03-01"

# Bind a Queue Consumer
[[queues.consumers]]
queue = "helmetsan-ingest-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

# Bind the R2 bucket
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "helmetsan-assets"

# Environment Variables
[vars]
R2_PUBLIC_URL = "https://cdn.example.com"
WORDPRESS_REST_URL = "https://yourwebsite.com/wp-json"
# Add WORDPRESS_WEBHOOK_SECRET via 'npx wrangler secret put WORDPRESS_WEBHOOK_SECRET'

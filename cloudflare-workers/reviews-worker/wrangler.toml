name = "helmetsan-reviews-worker"
main = "src/index.js"
compatibility_date = "2024-03-01"

# Bind the D1 Database
# You must run `npx wrangler d1 create helmetsan_reviews` first to get the database_id
[[d1_databases]]
binding = "DB"
database_name = "helmetsan_reviews"
database_id = "paste-your-database-id-here"

# Set TURNSTILE_SECRET_KEY via 'npx wrangler secret put TURNSTILE_SECRET_KEY'
